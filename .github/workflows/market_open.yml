# ─────────────────────────────────────────────────────────────────
# STEP 1 — Market Open (9:35 ET = 13:35 UTC)
# Fetches ATR and checks first candle for liquidity.
# Runs once per day, Mon–Fri.
# ─────────────────────────────────────────────────────────────────
name: "Trading — 1. Market Open (9:35 ET)"

on:
  schedule:
    - cron: "35 13 * * 1-5"   # 9:35 ET (UTC-4), weekdays only
  workflow_dispatch:            # allow manual trigger for testing

permissions:
  contents: write   # needed for git push back to repo

jobs:
  market-open:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market open (ATR + liquidity candle)
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python live_trader.py --mode open

      - name: Commit state files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "state: market open $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push