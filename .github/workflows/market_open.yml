# ─────────────────────────────────────────────────────────────────
# STEP 1 — Market Open (9:40 ET)
# timezone key handles EDT/EST DST automatically.
# Shifted to 9:40 to account for GitHub runner delay + IEX feed lag.
# ─────────────────────────────────────────────────────────────────
name: "Trading — 1. Market Open (9:40 ET)"

on:
  schedule:
    - cron: "40 9 * * 1-5"
      timezone: "America/New_York"
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: America/New_York

jobs:
  market-open:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show runner time (ET)
        run: echo "Runner time (ET) = $(date)"

      - name: Run market open (ATR + liquidity candle)
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python live_trader.py --mode open

      - name: Commit state files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "state: market open $(date +'%Y-%m-%d %H:%M ET')"
          git push
