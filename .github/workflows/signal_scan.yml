# ─────────────────────────────────────────────────────────────────
# STEP 2 — Signal Scan (every 5 min, 9:45–11:00 ET)
# Starts at 9:45 to ensure market_open has committed state first.
# timezone key handles EDT/EST DST automatically.
# ─────────────────────────────────────────────────────────────────
name: "Trading — 2. Signal Scan (5 min)"

on:
  schedule:
    - cron: "45 9  * * 1-5"
      timezone: "America/New_York"   # 9:45 ET
    - cron: "50 9  * * 1-5"
      timezone: "America/New_York"   # 9:50 ET
    - cron: "55 9  * * 1-5"
      timezone: "America/New_York"   # 9:55 ET
    - cron: "0  10 * * 1-5"
      timezone: "America/New_York"   # 10:00 ET
    - cron: "5  10 * * 1-5"
      timezone: "America/New_York"   # 10:05 ET
    - cron: "10 10 * * 1-5"
      timezone: "America/New_York"   # 10:10 ET
    - cron: "15 10 * * 1-5"
      timezone: "America/New_York"   # 10:15 ET
    - cron: "20 10 * * 1-5"
      timezone: "America/New_York"   # 10:20 ET
    - cron: "25 10 * * 1-5"
      timezone: "America/New_York"   # 10:25 ET
    - cron: "30 10 * * 1-5"
      timezone: "America/New_York"   # 10:30 ET
    - cron: "35 10 * * 1-5"
      timezone: "America/New_York"   # 10:35 ET
    - cron: "40 10 * * 1-5"
      timezone: "America/New_York"   # 10:40 ET
    - cron: "45 10 * * 1-5"
      timezone: "America/New_York"   # 10:45 ET
    - cron: "50 10 * * 1-5"
      timezone: "America/New_York"   # 10:50 ET
    - cron: "55 10 * * 1-5"
      timezone: "America/New_York"   # 10:55 ET
    - cron: "0  11 * * 1-5"
      timezone: "America/New_York"   # 11:00 ET
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: America/New_York

jobs:
  signal-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show runner time (ET)
        run: echo "Runner time (ET) = $(date)"

      - name: Run signal scan
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python live_trader.py --mode scan

      - name: Commit state files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "state: signal scan $(date +'%Y-%m-%d %H:%M ET')"
          git push
