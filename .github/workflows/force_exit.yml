# ─────────────────────────────────────────────────────────────────
# STEP 3 — Force Exit (11:05 ET)
# Closes all open option positions regardless of P&L.
# timezone key handles EDT/EST DST automatically.
# ─────────────────────────────────────────────────────────────────
name: "Trading — 3. Force Exit (11:05 ET)"

on:
  schedule:
    - cron: "5 11 * * 1-5"
      timezone: "America/New_York"
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: America/New_York

jobs:
  force-exit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Show runner time (ET)
        run: echo "Runner time (ET) = $(date)"

      - name: Close all positions
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python live_trader.py --mode exit

      - name: Commit final state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "state: exit $(date +'%Y-%m-%d %H:%M ET')"
          git push
